<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6D2B0A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>山顶咖啡值班签到</title>
  <style>
    :root {
      --coffee: #6D2B0A;
      --coffee-dark: #3A1B0E;
      --coffee-soft: #B9855A;
      --cream: #F7F1E8;
      --card: #FFFDF8;
      --line: #E8D8C8;
      --text: #2B1A12;
      --muted: #8A6B58;
      --success: #2F7D57;
      --danger: #B94A36;
      --shadow: 0 18px 42px rgba(58, 27, 14, 0.12);
      --shadow-soft: 0 8px 20px rgba(58, 27, 14, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% -8%, rgba(185, 133, 90, 0.24), transparent 32%),
        linear-gradient(180deg, var(--cream), #F3E6D8 100%);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 14px 22px;
      user-select: none;
      -webkit-user-select: none;
    }
    .app { width: 100%; max-width: 430px; display: flex; flex-direction: column; gap: 14px; }

    /* Header */
    .header { text-align: center; padding: 10px 0 2px; }
    .brand-logo {
      width: 88px;
      height: 88px;
      object-fit: contain;
      display: block;
      margin: 0 auto 8px;
      filter: drop-shadow(0 8px 16px rgba(58, 27, 14, 0.12));
    }
    .title {
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--coffee-dark);
      letter-spacing: 0;
    }
    .subtitle {
      font-size: 12px;
      color: var(--coffee);
      margin-top: 4px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .date { font-size: 13px; color: var(--muted); margin-top: 6px; }

    .main-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Name picker */
    .name-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .name-row label, .field label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }
    .name-row select {
      width: 100%;
      font-size: 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #FFFBF5;
      color: var(--text);
      outline: none;
      padding: 12px 14px;
      min-height: 48px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }
    .name-row select:focus,
    .field input:focus,
    .field select:focus,
    .modal input:focus,
    .modal select:focus {
      border-color: var(--coffee);
      box-shadow: 0 0 0 3px rgba(109, 43, 10, 0.10);
    }

    /* Button row: big button + toggle */
    .btn-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .btn-main {
      flex: 1;
      height: 72px;
      border: none;
      border-radius: 18px;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
      box-shadow: 0 10px 22px rgba(109, 43, 10, 0.22);
    }
    .btn-main:active { transform: scale(0.98); box-shadow: 0 5px 12px rgba(109, 43, 10, 0.16); }
    .btn-checkin  { background: var(--coffee); color: #fff; }
    .btn-checkout { background: var(--coffee-soft); color: #fff; }
    .btn-done {
      background: #F0E4D7;
      color: var(--muted);
      cursor: default;
      pointer-events: none;
      box-shadow: none;
    }

    .btn-toggle {
      width: 52px;
      flex-shrink: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #FFFBF5;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      color: var(--coffee);
    }
    .btn-toggle:active { background: #F0E4D7; }
    .btn-toggle.hidden { visibility: hidden; pointer-events: none; }

    /* Today record card */
    .card {
      background: #FFFBF5;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }
    .card h3,
    .section-title {
      font-size: 15px;
      margin-bottom: 12px;
      color: var(--coffee-dark);
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h3::before,
    .section-title::before {
      content: "";
      width: 8px;
      height: 18px;
      border-radius: 999px;
      background: var(--coffee-soft);
    }
    .record-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(232, 216, 200, 0.78);
      font-size: 15px;
    }
    .record-row:last-child { border-bottom: none; }
    .record-label { color: var(--muted); }
    .record-value {
      color: var(--coffee-dark);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 14px 8px;
      font-size: 14px;
      background: rgba(247, 241, 232, 0.72);
      border: 1px dashed var(--line);
      border-radius: 14px;
    }

    /* Adjustment request */
    .adj-link-row { text-align: center; padding: 0; margin-top: -2px; }
    .link-button {
      border: none;
      background: transparent;
      color: var(--coffee);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 999px;
    }
    .modal .link-button { flex: none; background: transparent; box-shadow: none; }
    .link-button:active { background: #F0E4D7; }
    .adj-trigger {
      color: var(--muted);
      font-weight: 650;
      font-size: 12.5px;
      padding: 7px 10px;
    }
    .adj-trigger:active {
      color: var(--coffee);
      background: rgba(185, 133, 90, 0.12);
    }
    .adj-card {
      width: min(100%, 420px);
      margin: 0 auto;
      background: rgba(255, 253, 248, 0.94);
      border: 1px solid rgba(232, 216, 200, 0.72);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(58, 27, 14, 0.09);
    }
    .adj-head {
      position: relative;
      padding-left: 12px;
      margin-bottom: 16px;
    }
    .adj-head::before {
      content: "";
      position: absolute;
      left: 0;
      top: 3px;
      width: 4px;
      height: 34px;
      border-radius: 999px;
      background: var(--coffee-soft);
    }
    .adj-title {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--coffee-dark);
      margin: 0;
    }
    .adj-desc {
      margin-top: 4px;
      font-size: 12.5px;
      line-height: 1.45;
      color: var(--muted);
    }
    .adj-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .adj-field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .adj-field label {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      color: var(--coffee-dark);
    }
    .adj-field input,
    .adj-field select {
      width: 100%;
      height: 52px;
      border: 1px solid rgba(232, 216, 200, 0.9);
      border-radius: 15px;
      padding: 0 14px;
      background: #FFFBF5;
      color: var(--text);
      font-size: 15px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }
    .adj-field input::placeholder { color: rgba(138, 107, 88, 0.68); }
    .adj-field input:focus,
    .adj-field select:focus {
      border-color: var(--coffee);
      box-shadow: 0 0 0 3px rgba(109, 43, 10, 0.10);
    }
    .adj-actions {
      display: flex;
      gap: 12px;
      padding-top: 2px;
    }
    .adj-actions button {
      height: 48px;
      border-radius: 15px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .adj-actions .btn-secondary {
      flex: 1;
      background: transparent;
      color: var(--coffee-dark);
      border: 1px solid var(--line) !important;
      box-shadow: none;
    }
    .adj-actions .btn-primary {
      flex: 2;
      background: var(--coffee);
      color: #fff;
      border: 1px solid var(--coffee);
      box-shadow: 0 8px 16px rgba(109, 43, 10, 0.16);
    }

    /* Admin link */
    .admin-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      margin-top: 4px;
    }
    .admin-link:hover { color: var(--coffee); }

    /* Modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(58, 27, 14, 0.36);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      width: 100%;
      max-width: min(720px, calc(100vw - 24px));
      max-height: 85dvh;
      overflow: auto;
      padding: 24px;
      box-shadow: 0 28px 70px rgba(58, 27, 14, 0.26);
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--coffee-dark); }
    .modal input,
    .modal select,
    .field input,
    .field select {
      width: 100%;
      font-size: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 12px;
      background: #FFFBF5;
      color: var(--text);
    }
    .modal .btn-row { display: flex; gap: 10px; }
    .modal button {
      flex: 1;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: var(--coffee); color: #fff; box-shadow: 0 6px 14px rgba(109, 43, 10, 0.16); }
    .btn-secondary { background: #F0E4D7; color: var(--coffee-dark); border: 1px solid var(--line) !important; }
    .btn-danger { background: var(--danger); color: #fff; font-size: 13px !important; padding: 6px 12px !important; flex: 0 !important; }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    /* Admin table */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
    }
    .admin-table th, .admin-table td {
      padding: 9px 7px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }
    .admin-table th {
      color: var(--muted);
      background: var(--cream);
      font-weight: 800;
      font-size: 12px;
    }
    .admin-table .name-col { font-weight: 700; }
    .muted-cell { font-size: 11px; color: var(--muted); }
    .tiny-muted { font-size: 10px; color: var(--muted); }
    .danger-text { color: var(--danger); }
    .success-text { color: var(--success); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--coffee-dark);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      z-index: 200;
      transition: transform 0.3s ease;
      pointer-events: none;
      letter-spacing: 0;
      box-shadow: 0 14px 30px rgba(58, 27, 14, 0.24);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Manage employees section */
    .employee-list { margin-top: 16px; }
    .employee-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .add-employee-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-employee-row input { flex: 1; margin-bottom: 0; }
    .form-stack { display: flex; flex-direction: column; gap: 10px; }
    .field input, .field select { margin-top: 5px; margin-bottom: 0; font-size: 15px; }
    .soft-panel {
      margin-top: 10px;
      padding: 12px;
      background: #FFFBF5;
      border: 1px solid var(--line);
      border-radius: 14px;
    }
    .section-block { margin-top: 22px; }
    .section-title { margin-bottom: 8px; }
    .tab-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .adj-tab {
      flex: 1;
      font-size: 12px;
      padding: 7px 6px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #FFFBF5;
      color: var(--coffee-dark);
      cursor: pointer;
      font-weight: 700;
    }
    .adj-tab.active { background: var(--coffee); color: #fff; border-color: var(--coffee); }
    .stats-controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .stats-controls input { flex: 1; margin-bottom: 0; font-size: 14px; min-width: 0; }
    .stats-controls button { flex: 0 0 auto; padding: 7px 12px; font-size: 13px; }
    .review-btn { font-size: 11px !important; padding: 5px 9px !important; flex: none !important; }
    .empty-inline { text-align: center; color: var(--muted); padding: 12px; font-size: 13px; }

    @media (max-width: 400px) {
      .btn-main { height: 64px; font-size: 22px; }
      .brand-logo { width: 76px; height: 76px; }
      .main-card { padding: 16px; border-radius: 22px; }
      .adj-card { padding: 16px; border-radius: 19px; }
      .adj-title { font-size: 19px; }
      .adj-form { gap: 13px; }
      .adj-field input,
      .adj-field select { height: 50px; border-radius: 14px; }
      .adj-actions button { height: 48px; }
      .modal { padding: 18px; }
      .stats-controls { flex-wrap: wrap; }
      .stats-controls input { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <img class="brand-logo" src="assets/logo-mark.png" alt="山顶咖啡">
      <div class="title">山顶咖啡值班签到</div>
      <div class="subtitle">Hill Top Coffee Punch</div>
      <div class="date" id="dateDisplay"></div>
    </div>

    <section class="main-card">
    <!-- Name picker -->
    <div class="name-row">
      <label for="nameSelect">值班人员</label>
      <select id="nameSelect"></select>
    </div>

    <!-- Button row: main action + mode toggle -->
    <div class="btn-row">
      <button class="btn-main" id="btnMain" disabled>暂无值班人员，请联系管理员添加</button>
      <button class="btn-toggle hidden" id="btnToggle" title="切换签到/签退">⇄</button>
    </div>

    <!-- Today's record -->
    <div class="card" id="todayCard" style="display:none">
      <h3>今日记录</h3>
      <div id="todayRecords"></div>
    </div>

    <!-- Adjustment request -->
    <div class="adj-link-row">
      <button class="link-button adj-trigger" id="adjLink" type="button">忘记签到/签退？申请补签</button>
    </div>
    <div id="adjForm" style="display:none">
      <div class="adj-card">
        <div class="adj-head">
          <h3 class="adj-title">补签申请</h3>
          <p class="adj-desc">忘记签到或签退时，可在这里提交申请</p>
        </div>
        <div class="adj-form">
          <div class="adj-field">
            <label>补签日期</label>
            <input type="date" id="adjDate">
          </div>
          <div class="adj-field">
            <label>补签类型</label>
            <select id="adjType">
              <option value="checkin">补签到</option>
              <option value="checkout">补签退</option>
              <option value="both">补签到和补签退</option>
            </select>
          </div>
          <div class="adj-field" id="adjCheckInGroup">
            <label>补签到时间</label>
            <input type="time" id="adjCheckIn">
          </div>
          <div class="adj-field" id="adjCheckOutGroup">
            <label>补签退时间</label>
            <input type="time" id="adjCheckOut">
          </div>
          <div class="adj-field">
            <label>申请原因</label>
            <input type="text" id="adjReason" placeholder="请填写原因" maxlength="200">
          </div>
          <div class="adj-actions">
            <button class="btn-secondary" id="adjCancel">取消</button>
            <button class="btn-primary" id="adjSubmit">提交申请</button>
          </div>
        </div>
      </div>
    </div>
    </section>

    <!-- Admin link -->
    <div class="admin-link" id="adminLink">管理员入口</div>
  </div>

  <!-- Admin modal -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal">
      <h2>管理员入口</h2>
      <input type="password" id="adminPassword" placeholder="输入密码" maxlength="20">
      <div class="btn-row">
        <button class="btn-secondary" id="adminCancel">取消</button>
        <button class="btn-primary" id="adminLogin">进入</button>
      </div>
      <div id="adminContent" style="display:none">
        <div class="section-block">
          <button class="btn-secondary" id="adminRefresh" style="width:100%">刷新</button>
        </div>
        <div style="text-align:center;margin-top:10px">
          <button class="link-button" id="changePwLink" type="button">修改密码</button>
        </div>
        <div class="soft-panel" id="changePwForm" style="display:none">
          <input type="password" id="oldPw" placeholder="旧密码" maxlength="20">
          <input type="password" id="newPw" placeholder="新密码" maxlength="20">
          <input type="password" id="confirmPw" placeholder="确认新密码" maxlength="20">
          <div class="btn-row">
            <button class="btn-secondary" id="changePwCancel">取消</button>
            <button class="btn-primary" id="changePwSubmit">确认修改</button>
          </div>
        </div>
        <div class="section-block">
          <h3 class="section-title">值班人员管理</h3>
          <div class="employee-list" id="employeeList"></div>
          <div class="add-employee-row">
            <input type="text" id="newEmployeeName" placeholder="值班人员姓名" maxlength="20">
            <button class="btn-primary" id="addEmployeeBtn" style="flex:0 0 auto;padding:8px 16px;font-size:13px">添加</button>
          </div>
        </div>
        <table class="admin-table" id="adminTable">
          <thead><tr><th>ID</th><th>值班人员</th><th>日期</th><th>签到</th><th>签退</th><th>工时</th><th>设备ID</th><th>IP来源</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="empty-inline" id="adminEmpty" style="margin-top:24px">暂无记录</div>

        <!-- Adjustment review -->
        <div class="section-block">
          <h3 class="section-title">补签审核</h3>
          <div class="tab-row">
            <button class="adj-tab active" data-status="pending">待审核</button>
            <button class="adj-tab" data-status="approved">已通过</button>
            <button class="adj-tab" data-status="rejected">已拒绝</button>
          </div>
          <div id="adjReviewList"></div>
        </div>

        <!-- Review action modal -->
        <div class="soft-panel" id="reviewModal" style="display:none">
          <input type="text" id="reviewNote" placeholder="审核备注（可选）" maxlength="200">
          <div class="btn-row">
            <button class="btn-secondary" id="reviewCancel">取消</button>
            <button class="btn-primary" id="reviewApprove">通过</button>
            <button class="btn-danger" id="reviewReject" style="flex:1;font-weight:600">拒绝</button>
          </div>
        </div>

        <!-- Monthly statistics -->
        <div class="section-block">
          <h3 class="section-title">月度统计</h3>
          <div class="stats-controls">
            <input type="month" id="statMonth">
            <button class="btn-primary" id="statLoad">查询</button>
            <button class="btn-secondary" id="statExport">导出</button>
          </div>
          <div id="statSummary"></div>
          <div id="statDetail" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Inline app logic -->
  <script>
  (function() {
    // ── Constants ──
    const API_BASE = '';

    // ── Storage keys ──
    const KEY_DEVICE_ID = 'cafe_device_id';
    const KEY_LAST_MEMBER = 'cafe_last_member_id';

    // ── Device ID ──
    function getDeviceId() {
      let id = localStorage.getItem(KEY_DEVICE_ID);
      if (!id) {
        id = Math.random().toString(16).slice(2, 8);
        localStorage.setItem(KEY_DEVICE_ID, id);
      }
      return id;
    }
    const DEVICE_ID = getDeviceId();

    function todayDateLocal() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // ── Date helpers ──
    function formatDateDisplay() {
      const d = new Date();
      const w = ['日','一','二','三','四','五','六'];
      return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日 星期' + w[d.getDay()];
    }

    function timeOnly(ts) {
      if (!ts) return '';
      const m = ts.match(/(\d{2}:\d{2}:\d{2})/);
      return m ? m[1] : ts;
    }

    function hoursBetween(t1, t2) {
      const a = timeOnly(t1), b = timeOnly(t2);
      if (!a || !b) return '—';
      const [h1, m1] = a.split(':').map(Number);
      const [h2, m2] = b.split(':').map(Number);
      const mins = (h2 * 60 + m2) - (h1 * 60 + m1);
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return h + '小时' + (m > 0 ? m + '分' : '');
    }

      });
      return res.json();
    }

    // ── Toast ──
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);

      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);

    // ── Load members from API ──
    function getLastMemberId() {
      return localStorage.getItem(KEY_LAST_MEMBER) || '';
    }
    function setLastMemberId(id) {
      localStorage.setItem(KEY_LAST_MEMBER, id);
    }

    async function loadMembers() {
      try {
        const res = await api('/api/members');
        if (res.ok) members = res.members || [];
        else members = [];
      } catch (e) {
        // offline: keep whatever was last loaded
      }
    }

    function populateNameSelect() {
      const lastId = getLastMemberId();
      nameSelect.innerHTML = '';
      if (members.length === 0) {
        nameSelect.innerHTML = '<option value="">-- 暂无值班人员 --</option>';
        return;
      }
      members.forEach(m => {
        const o = document.createElement('option');
        o.value = m.id;
        o.textContent = m.name;
        nameSelect.appendChild(o);
      });
      // Restore last selection if still valid
      if (members.some(m => String(m.id) === lastId)) {
        nameSelect.value = lastId;
      } else {
        nameSelect.value = members[0].id;
      }
    }

    function selectedMemberId() {
      const v = nameSelect.value;
      return v || null;
    }

    // ── Fetch today's record ──
    async function fetchTodayRecord(memberId) {
      if (!memberId) return null;
      try {
        const res = await api('/api/records/today?member_id=' + memberId);
        if (res.ok && res.record) {
          return { check_in: res.record.check_in, check_out: res.record.check_out || null };
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    // ── Mode detection ──
    function getAutoMode() {
      if (!todayRecordCache) return 'in';
      if (!todayRecordCache.check_out) return 'out';
      return 'done';
    }
    function getEffectiveMode() {
      if (manualMode) return manualMode;
      return getAutoMode();
    }

    // ── Render ──
    function render() {
      const mid = selectedMemberId();

      if (members.length === 0 || !mid) {
        btnMain.textContent = '暂无值班人员，请联系管理员添加';
        btnMain.className = 'btn-main btn-done';
        btnMain.disabled = true;
        btnToggle.classList.add('hidden');
        todayCard.style.display = 'none';
        return;
      }

      const autoMode = getAutoMode();
      const mode = getEffectiveMode();

      if (mode === 'in') {
        btnMain.textContent = '签  到';
        btnMain.className = 'btn-main btn-checkin';
        btnMain.disabled = false;
      } else if (mode === 'out') {
        btnMain.textContent = '签  退';
        btnMain.className = 'btn-main btn-checkout';
        btnMain.disabled = false;
      } else {
        btnMain.textContent = '今日已完成';
        btnMain.className = 'btn-main btn-done';
        btnMain.disabled = true;
      }

      if (autoMode === 'done') {
        btnToggle.classList.add('hidden');
      } else {
        btnToggle.classList.remove('hidden');
        btnToggle.textContent = mode === 'in' ? '→' : '←';
      }

      if (todayRecordCache) {
        todayCard.style.display = 'block';
        let html = '<div class="record-row"><span class="record-label">签到时间</span><span class="record-value">' + escapeHtml(timeOnly(todayRecordCache.check_in)) + '</span></div>';
        if (todayRecordCache.check_out) {
          html += '<div class="record-row"><span class="record-label">签退时间</span><span class="record-value">' + escapeHtml(timeOnly(todayRecordCache.check_out)) + '</span></div>';
          html += '<div class="record-row"><span class="record-label">总工时</span><span class="record-value">' + escapeHtml(hoursBetween(todayRecordCache.check_in, todayRecordCache.check_out)) + '</span></div>';
        }
        todayRecords.innerHTML = html;
      } else {
        todayCard.style.display = 'block';
        todayRecords.innerHTML = '<div class="empty-state">今天还没有签到记录</div>';
      }

      if (manualMode && manualMode === autoMode) {
        manualMode = null;
      }
    }

    async function refreshAndRender() {
      const mid = selectedMemberId();
      if (mid) {
        todayRecordCache = await fetchTodayRecord(mid);
      }
      render();
    }

    // ── Action ──
    async function doAction() {
      const mid = selectedMemberId();
      if (!mid) return;
      const mode = getEffectiveMode();
      if (mode === 'done') return;

      if (mode === 'in') {
        if (todayRecordCache) {
          showToast('⚠ 今天已经签过到了');
          return;
        }
        await doCheckin(mid);
      } else {
        if (!todayRecordCache) {
          showToast('⚠ 还没签到，无法签退');
          return;
        }
        if (todayRecordCache.check_out) {
          showToast('⚠ 今天已经签退过了');
          return;
        }
        await doCheckout(mid);
      }
    }

    async function doCheckin(memberId) {
      btnMain.disabled = true;
      try {
        const res = await api('/api/checkin', {
          method: 'POST',
          body: JSON.stringify({ member_id: memberId, device_id: DEVICE_ID }),
        });
        if (res.ok) {
          todayRecordCache = { check_in: res.check_in, check_out: null };
          manualMode = null;
          showToast('✅ 签到成功 ' + timeOnly(res.check_in));
          render();
        } else {
          btnMain.disabled = false;
          showToast('⚠ ' + (res.error || '签到失败'));
        }
      } catch (e) {
        btnMain.disabled = false;
        showToast('⚠ 网络异常，签到失败。请稍后重试；如果已经离开，请联系管理员处理。');
      }
    }

    async function doCheckout(memberId) {
      btnMain.disabled = true;
      try {
        const res = await api('/api/checkout', {
          method: 'POST',
          body: JSON.stringify({ member_id: memberId, device_id: DEVICE_ID }),
        });
        if (res.ok) {
          todayRecordCache = { check_in: res.check_in, check_out: res.check_out };
          manualMode = null;
          showToast('👋 签退成功，辛苦了！');
          render();
        } else {
          btnMain.disabled = false;
          showToast('⚠ ' + (res.error || '签退失败'));
        }
      } catch (e) {
        btnMain.disabled = false;
        showToast('⚠ 网络异常，签退失败。请稍后重试；如果已经离开，请联系管理员处理。');
      }
    }

    async function renderMemberList() {
      try {
        const res = await api('/api/admin/members', {
          headers: { 'Authorization': 'Bearer ' + adminToken }
        });
        if (!res.ok) return;

        const allMembers = res.members || [];
        employeeList.innerHTML = '';
        allMembers.forEach(m => {
          const div = document.createElement('div');
          div.className = 'employee-item';
          const statusBadge = m.status === 'inactive'
            ? '<span class="danger-text" style="font-size:11px;margin-right:6px">[已停用]</span>'
            : '';
          div.innerHTML =
            '<span>' + statusBadge + escapeHtml(m.name) + '</span>' +
            '<div style="display:flex;gap:4px">' +
            (m.status === 'active'
              ? '<button class="btn-danger" data-id="' + m.id + '" data-action="deactivate">停用</button>'
              : '') +
            '</div>';
          employeeList.appendChild(div);
        });

        employeeList.querySelectorAll('.btn-danger').forEach(btn => {
          btn.addEventListener('click', async function() {
            const id = this.dataset.id;
            const action = this.dataset.action;
            if (action === 'deactivate') {
              if (!confirm('确定停用该值班人员吗？')) return;
              const r = await api('/api/admin/members/deactivate', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + adminToken },
                body: JSON.stringify({ id }),
              });
              if (r.ok) {
                showToast('已停用');
                await renderMemberList();
                await loadMembers();
                populateNameSelect();
                await refreshAndRender();
              } else {
                showToast('⚠ ' + (r.error || '操作失败'));
              }
            }
          });
        });
      } catch (e) {
        // ignore
      }
    }

      const mid = selectedMemberId();

      try {
        const resp = await fetch('/api/admin/export/monthly.xlsx?month=' + month, {

        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          showToast('⚠ ' + (err.error || '导出失败')); return;
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'cafe-attendance-' + month + '.xlsx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        showToast('⚠ 网络错误');
      }
    });

          statDetail.innerHTML = '';

                '<td>' + (r.check_out ? escapeHtml(r.check_out.slice(11, 19)) : '—') + '</td>' +
                '<td>' + (r.hours > 0 ? r.hours + ' 小时' : '—') + '</td>' +
                '<td><span class="' + (sClass[r.status] || 'muted-cell') + '">' + escapeHtml(sLabel[r.status] || r.status) + '</span></td>' +
                '<td class="tiny-muted">' + (r.device_id ? escapeHtml(r.device_id.slice(-6)) : '—') + '</td>' +
                '<td class="tiny-muted">' + (r.source_ip ? escapeHtml(r.source_ip) : '—') + '</td>' +
                '</tr>';
            });
            dh += '</tbody></table>';
            statDetail.innerHTML = dh;
          });
        });
      } catch (e) {
        showToast('⚠ 网络错误');
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // Set default month to current
    (function() {
      const d = new Date();
      statMonth.value = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    })();

    changePwLink.addEventListener('click', function() {
      changePwForm.style.display = changePwForm.style.display === 'none' ? 'block' : 'none';
      oldPw.value = '';
      newPw.value = '';
      confirmPw.value = '';
    });

    changePwCancel.addEventListener('click', function() {
      changePwForm.style.display = 'none';
    });

    changePwSubmit.addEventListener('click', async function() {
      const old = oldPw.value;
      const neu = newPw.value;
      const confirm = confirmPw.value;
      if (!old || !neu || !confirm) { showToast('请填写所有密码字段'); return; }
      if (neu.length < 2) { showToast('新密码至少2位'); return; }
      if (neu !== confirm) { showToast('两次新密码不一致'); return; }

      try {
        const res = await api('/api/admin/password', {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ old, new: neu }),
        });
        if (res.ok) {
          changePwForm.style.display = 'none';
          showToast('✅ 密码已修改，请重新登录');
          adminToken = null;
          adminContent.style.display = 'none';
        } else {
          showToast('❌ ' + (res.error || '修改失败'));
        }
      } catch (e) {
        showToast('⚠ 网络错误');
      }
    });

    addEmployeeBtn.addEventListener('click', async function() {
      const name = newEmployeeName.value.trim();
      if (!name) { showToast('请输入值班人员姓名'); return; }
      try {
        const res = await api('/api/admin/members', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + adminToken },
          body: JSON.stringify({ name }),
        });
        if (res.ok) {
          newEmployeeName.value = '';
          showToast('已添加「' + name + '」');
          await renderMemberList();
          await loadMembers();
          populateNameSelect();
          setLastMemberId(String(res.member.id));
          await refreshAndRender();
        } else {
          showToast('⚠ ' + (res.error || '添加失败'));
        }
      } catch (e) {
        showToast('⚠ 网络错误');
      }
    });
    newEmployeeName.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addEmployeeBtn.click();
    });

    // ── Adjustment request ──
    adjLink.addEventListener('click', function() {
      const show = adjForm.style.display === 'none' || !adjForm.style.display;
      adjForm.style.display = show ? 'block' : 'none';
      if (show) {
        adjDate.value = todayDateLocal();
        adjType.value = 'checkin';
        adjCheckIn.value = '';
        adjCheckOut.value = '';
        adjReason.value = '';
        updateAdjTimeFields();
      }
    });

    adjCancel.addEventListener('click', function() {
      adjForm.style.display = 'none';
    });

    adjType.addEventListener('change', updateAdjTimeFields);

    function updateAdjTimeFields() {
      const t = adjType.value;
      adjCheckInGroup.style.display = (t === 'checkin' || t === 'both') ? '' : 'none';
      adjCheckOutGroup.style.display = (t === 'checkout' || t === 'both') ? '' : 'none';
    }

    adjSubmit.addEventListener('click', async function() {
      const mid = selectedMemberId();
      if (!mid) { showToast('请先选择值班人员'); return; }

      const date = adjDate.value.trim();
      const type = adjType.value;
      const checkIn = adjCheckIn.value.trim();
      const checkOut = adjCheckOut.value.trim();
      const reason = adjReason.value.trim();

      if (!date) { showToast('请选择补签日期'); return; }
      if (!reason) { showToast('请填写申请原因'); return; }
      if (type === 'checkin' || type === 'both') {
        if (!checkIn) { showToast('请填写补签到时间'); return; }
      }
      if (type === 'checkout' || type === 'both') {
        if (!checkOut) { showToast('请填写补签退时间'); return; }
      }

      adjSubmit.disabled = true;
      try {
        const res = await api('/api/adjustment-requests', {
          method: 'POST',
          body: JSON.stringify({
            member_id: mid,
            date,
            request_type: type,
            requested_check_in: checkIn || null,
            requested_check_out: checkOut || null,
            reason,
            device_id: DEVICE_ID,
          }),
        });
        if (res.ok) {
          adjForm.style.display = 'none';
          showToast('✅ 补签申请已提交，等待管理员审核');
        } else {
          showToast('⚠ ' + (res.error || '提交失败'));
        }
      } catch (e) {
        showToast('⚠ 网络异常，提交失败。请稍后重试');
      }
      adjSubmit.disabled = false;
    });

    // ── Init ──
    async function init() {
      dateDisplay.textContent = formatDateDisplay();
      await loadMembers();
      populateNameSelect();
      await refreshAndRender();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    }
    init();
  })();
  </script>
</body>
</html>
